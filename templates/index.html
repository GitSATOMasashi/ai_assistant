<!DOCTYPE html>
<html>
    <head>
        <title>講座生成ツール | スキルプラス</title>
        <link rel="icon" type="image/png" href="https://utagesystem.s3.ap-northeast-1.amazonaws.com/GYbKT7Y9d0eR/HJ0dPMDAxFWVgbt4WpedkCyrlU6fDnLSKMS0nWyd.png">
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            primary: {
                                DEFAULT: '#14106d',  // 基本のプライマリーカラー
                                light: '#1d187f',    // ホバー時などに使用する明るめの色
                                dark: '#0c0945',     // アクティブ時などに使用する暗めの色
                                50: '#eeeeff',       // 薄い背景などに使用
                                100: '#e0e0ff'       // 選択状態の背景などに使用
                            }
                        }
                    }
                }
            }
        </script>
        <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    </head>
    <body class="bg-white">
        <!-- ヘッダーを追加 -->
        <header class="fixed top-0 left-0 right-0 h-14 border-b z-50 flex items-center bg-gradient-to-r from-[#14106d] to-[#2d26b4]">
            <div class="w-72 px-4 border-r h-full flex items-center justify-between border-white/10">
                <img 
                    src="https://utagesystem.s3.ap-northeast-1.amazonaws.com/GYbKT7Y9d0eR/lWxuhEMydgkvCjlDrIz6WVN0inLMiTfDWoT8l3y0.png" 
                    alt="講義生成ツール" 
                    class="w-auto object-contain"
                    style="height: 20px; padding-left: 30px;"
                >
                <span class="text-white">|</span>
                <img 
                    src="https://utagesystem.s3.ap-northeast-1.amazonaws.com/GYbKT7Y9d0eR/site/hmVD4xF1NEqp7KMtARVEmpfW5wJAGEqmrWiqS1Qa.png" 
                    alt="スキルプラス ロゴ" 
                    class="w-auto object-contain"
                    style="height: 20px; padding-right: 30px; padding-left: 5px;"
                >
            </div>

                <div class="text-sm text-white/70">
                    <!-- 必要に応じて追加のヘッダー情報 -->
                </div>
                <div class="flex items-center gap-4">
                    <button 
                        onclick="resetTokens()"

                        title="トークン数をリセットします"

                        リセット
                    </button>
                    <div class="text-sm text-white/90">

                    </div>
                </div>
            </div>
        </header>

        <!-- メインコンテンツのラッパー -->
        <div class="flex h-screen pt-14">
            <!-- サイドバー: h-screenからpt-14を引いた高さにする -->
            <div class="w-72 border-r bg-gray-50 overflow-y-auto" style="height: calc(100vh - 3.5rem);">
                <!-- 新しいトークボタンを固定表示 -->
                <div class="sticky top-0 p-4 bg-gray-50 border-b z-10">
                    <button onclick="createNewChat()" class="new-chat-button w-full flex items-center justify-center bg-gray-50 text-primary border-2 border-primary hover:bg-primary hover:text-white px-4 py-2 transition-colors rounded-[25px]">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        新しいトーク
                    </button>
                </div>
                
                <!-- チャットリスト -->
                <div class="px-4">
                    <!-- ピン留めしたトーク -->
                    <div class="chat-section">
                        <h3 class="chat-section-title">ピン留め</h3>
                        <div id="pinnedChats" class="chat-list"></div>
                    </div>

                    <!-- すべてのトーク -->
                    <div class="chat-section">
                        <h3 class="chat-section-title">すべてのトーク</h3>
                        <div id="allChats" class="chat-list"></div>
                    </div>
                </div>
            </div>

            <!-- メインチャットエリア -->
            <div class="flex-1 flex flex-col">
                <div class="flex-1 overflow-y-auto p-4" id="messages">
                    <!-- ローディング表示用のHTML -->
                    <div id="loadingMessage" class="hidden">
                        <div class="flex justify-start mb-4">
                            <div class="bg-gray-100 rounded-lg px-4 py-2 max-w-[70%] flex items-center">
                                <div class="typing-indicator">
                                    <span></span>
                                    <span></span>
                                    <span></span>
                                </div>
                                <span class="ml-2">
                                    応答を生成中...<br>
                                    <span class="text-sm text-gray-500">応答までに最大で60~120秒ほどかかる場合があります。</span>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="border-t p-4 flex items-start">
                    <textarea 
                        id="messageInput"
                        class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none overflow-y-auto"
                        placeholder="メッセージを入力...(Shift + Enter で送信)"
                        rows="1"
                        style="min-height: 44px;"
                    ></textarea>
                    <button 
                        id="sendButton" 
                        onclick="sendMessage()" 
                        class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-primary/80 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                        disabled
                    >
                        送信
                    </button>
                </div>
            </div>
        </div>

        <!-- ボット選択モーダル -->
        <div id="botSelector" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
            <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">チャットモードを選択</h2>
                    <button onclick="closeBotSelector()" class="text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="space-y-3">
                    <button onclick="selectBot('bot1', '目次作成モード')" class="w-full p-4 text-left border rounded-lg hover:bg-gray-50">
                        <h3 class="font-medium">目次作成モード</h3>
                        <p class="text-sm text-gray-500">講座全体の目次を作成します。</p>
                    </button>
                    <button onclick="selectBot('bot2', '講義作成モード')" class="w-full p-4 text-left border rounded-lg hover:bg-gray-50">
                        <h3 class="font-medium">講義作成モード</h3>
                        <p class="text-sm text-gray-500">講義ページの内容を作成します。</p>
                    </button>
                    <button onclick="selectBot('bot3', 'スライド作成モード')" class="w-full p-4 text-left border rounded-lg hover:bg-gray-50">
                        <h3 class="font-medium">スライド作成モード</h3>
                        <p class="text-sm text-gray-500">講義スライドを作成します。</p>
                    </button>
                    <button onclick="selectBot('bot4', 'スライド埋め込みコード作成')" class="w-full p-4 text-left border rounded-lg hover:bg-gray-50">
                        <h3 class="font-medium">スライド埋め込みコード作成</h3>
                        <p class="text-sm text-gray-500">講義ページにスライドを埋め込むためのコードを作成します。</p>
                    </button>
                </div>
            </div>
        </div>

        <!-- トークのメニューモーダル -->
        <div id="chatMenu" class="chat-menu hidden">
            <button onclick="editChatTitle()" class="chat-menu-item">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
                タイトルの編集
            </button>
            <button onclick="togglePinChat()" class="chat-menu-item">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
                </svg>
                ピン留め
            </button>
            <button onclick="deleteChat()" class="chat-menu-item text-red-600">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
                削除
            </button>
        </div>

        <!-- モーダルを追加（bodyの最後） -->
        <div id="tokenLimitModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
            <div class="bg-white rounded-lg p-6 max-w-md mx-4 relative">
                <div class="absolute top-4 right-4">
                    <button onclick="closeTokenLimitModal()" class="text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                <div id="tokenLimitModalContent" class="whitespace-pre-line text-gray-700"></div>
            </div>
        </div>

        <!-- エラーモーダル -->
        <div id="errorModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
            <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-red-600">500エラー</h2>
                    <button onclick="closeErrorModal()" class="text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="space-y-4">
                    <p id="errorMessage" class="text-gray-600"></p>
                    <div class="text-sm text-gray-500">
                        <p class="font-medium mb-2">考えられる原因:</p>
                        <ul class="list-disc pl-5 space-y-1">
                            <li>応答生成のタイムアウト</li>
                            <li>サーバーの一時的な問題</li>
                            <li>トークン制限の超過</li>
                        </ul>
                    </div>
                    <div class="text-sm text-gray-500">
                        <p class="font-medium mb-2">対処方法:</p>
                        <ul class="list-disc pl-5 space-y-1">
                            <li>しばらく待ってから再度お試しください</li>
                            <li>メッセージを短く分けて送信してみてください</li>
                            <li>ブラウザをリロードしてください</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <script>
            function canSendMessage() { // メッセージ送信可能か確認
                const remainingTokens = parseInt(document.getElementById('remainingTokens').textContent); // 残りトークンを取得
                if (remainingTokens <= 0) { // 残りトークンが0以下の場合
                    showTokenLimitModal(getTokenLimitMessage()); // トークン制限メッセージを表示
                    return false; // 送信不可
                }
                return true; // 送信可能
            }
            
            // チャットの状態管理
            let chats = []; // チャット履歴
            let currentChatId = null; // 現在のチャットID
            let currentBot = null; // 現在のボットID

            // トークン管理のクラスを修正
            class TokenManager { // トークン管理クラス
                constructor(dailyLimit = 30000) { // 1日のトークン上限
                    this.dailyLimit = dailyLimit; // 1日のトークン上限
                    this.loadFromStorage(); // LocalStorageからデータを読み込む
                }

                loadFromStorage() { // LocalStorageからデータを読み込む
                    const stored = localStorage.getItem('tokenUsage'); // LocalStorageからデータを取得
                    if (stored) { // データがある場合
                        const data = JSON.parse(stored); // JSON形式に変換
                        // 日付が変わっていたらリセット
                        const today = new Date().toDateString(); // 今日の日付を取得
                        if (data.date === today) { // データの日付が今日の日付と一致する場合
                            this.usedTokens = data.usedTokens; // 使用済みトークンを更新
                            this.updateDisplay(); // 表示を更新
                            return; // 処理を終了
                        }
                    }
                    // 新しい日、またはデータがない場合
                    this.resetTokens(); // トークンをリセット
                }

                saveToStorage() { // LocalStorageにデータを保存
                    const data = { // データを作成
                        date: new Date().toDateString(), // 今日の日付を取得
                        usedTokens: this.usedTokens // 使用済みトークンを取得
                    };
                    localStorage.setItem('tokenUsage', JSON.stringify(data)); // LocalStorageに保存
                }

                resetTokens() {
                    this.usedTokens = 0; // 使用済みトークンを0にリセット
                    this.saveToStorage(); // LocalStorageに保存
                    this.updateDisplay(); // 表示を更新
                }

                getRemainingTokens() { // 残りトークンを取得
                    return this.dailyLimit - this.usedTokens; // 1日のトークン上限から使用済みトークンを引いた値を返す
                }

                useTokens(count) { // 使用済みトークンを更新
                    this.usedTokens += count; // 使用済みトークンを更新
                    this.saveToStorage(); // LocalStorageに保存
                    this.updateDisplay(); // 表示を更新
                    return this.getRemainingTokens(); // 残りトークンを返す
                }

                updateDisplay() { // 表示を更新
                    document.getElementById('remainingTokens').textContent = this.getRemainingTokens(); // 残りトークンを表示
                }

                // トークン計算をサーバーに委譲
                async calculateTokens(text) { // トークン計算をサーバーに委譲
                    try { // エラーハンドリング
                        const response = await fetch('/calculate_tokens', { // サーバーにリクエストを送信
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                text: text, // テキストを送信
                                user_id: 'default_user'  // 必要に応じてユーザーIDを設定
                            })
                        });
                        
                        if (!response.ok) { // レスポンスが正常でない場合
                            throw new Error('トークン計算に失敗しました'); // エラーをスロー
                        }
                        
                        const data = await response.json(); // レスポンスをJSON形式に変換
                        return data.tokens; // トークン数を返す
                    } catch (error) { // エラーハンドリング
                        console.error('トークン計算エラー:', error); // エラーをコンソールに出力
                        return this.fallbackCalculateTokens(text); // フォールバック用のトークン計算を実行
                    }
                }

                // フォールバック用のトークン計算（クライアントサイド）
                fallbackCalculateTokens(text) { // フォールバック用のトークン計算
                    const japaneseChars = (text.match(/[\u3000-\u303f\u3040-\u309f\u30a0-\u30ff\u4e00-\u9faf\u3400-\u4dbf]/g) || []).length; // 日本語文字の数を取得
                    const otherChars = (text.match(/[a-zA-Z0-9\s\W]/g) || []).length; // その他の文字の数を取得
                    return Math.max(1, Math.ceil(japaneseChars * 2.5 + otherChars * 0.5)); // トークン数を返す
                }
            }

            // トークンマネージャーのインスタンスを作成
            const tokenManager = new TokenManager(30000);

            // LocalStorageからチャット履歴を読み込む
            function loadChats() { // チャット履歴を読み込む
                const savedChats = localStorage.getItem('chats'); // LocalStorageからチャット履歴を取得
                if (savedChats) { // チャット履歴がある場合
                    chats = JSON.parse(savedChats); // JSON形式に変換
                    updateChatList(); // チャットリストを更新
                }
            }

            // チャット履歴を保存
            function saveChats() { // チャット履歴を保存
                localStorage.setItem('chats', JSON.stringify(chats)); // LocalStorageに保存
            }

            // 新しいトークを作成
            function createNewChat() { // 新しいトークを作成
                const newChat = { // 新しいトークを作成
                    id: Date.now().toString(), // 現在の時刻を取得
                    title: '※チャットモード未選択', // タイトルを設定
                    messages: [], // メッセージを初期化
                    pinned: false, // ピン留め状態を初期化
                    bot: null, // ボットIDを初期化
                    conversation_id: null  // 各トーク固有の会話ID
                };
                
                chats.push(newChat); // チャット履歴に新しいトークを追加
                currentChatId = newChat.id; // 現在のトークIDを更新
                currentBot = null; // 現在のボットIDを初期化
                
                displayMessages([]);  // メッセージをクリア
                updateChatList(); // チャットリストを更新
                saveChats(); // チャット履歴を保存
                openBotSelector();  // ボット選択モーダルを開く
            }

            // ボットごとの初期メッセージを定義
            const BOT_INITIAL_MESSAGES = { // ボットごとの初期メッセージを定義
                bot1: {
                    title: '目次作成モード',
                    message: '作成する講座のタイトルと目的を入力してください。'
                },
                bot2: {
                    title: '講義作成モード',
                    message: '作成した目次をそのまま入力してください。'
                },
                bot3: {
                    title: 'スライド作成モード',
                    message: '講義のHTMLコードを入力してください。'
                },
                bot4: {
                    title: 'スライド埋め込みコード作成',
                    message: 'Googleドライブの共有リンクを入力してください。'
                }
            };

            // チャットボットを選択して紐づけ
            function selectBot(botId, botTitle) { // チャットボットを選択して紐づけ
                const chat = chats.find(c => c.id === currentChatId); // 現在のトークを取得
                if (!chat) return; // トークがない場合は処理を終了
                
                // ボット情報を更新
                chat.bot = botId; // ボットIDを更新
                chat.title = BOT_INITIAL_MESSAGES[botId].title; // タイトルを更新
                currentBot = botId; // 現在のボットIDを更新
                
                // ボットごとの初期メッセージを追加
                chat.messages.push({
                    role: 'assistant',
                    content: BOT_INITIAL_MESSAGES[botId].message
                });
                
                displayMessages(chat.messages); // メッセージを表示
                updateChatList(); // チャットリストを更新
                saveChats(); // チャット履歴を保存
                closeBotSelector(); // ボット選択モーダルを閉じる
            }

            function updateChatList() { // チャットリストを更新
                const pinnedChats = document.getElementById('pinnedChats'); // ピン留めされたトークを取得
                const allChats = document.getElementById('allChats'); // 全てのトークを取得
                
                pinnedChats.innerHTML = ''; // ピン留めされたトークをクリア
                allChats.innerHTML = ''; // 全てのトークをクリア
                
                // 作成日時の新しい順にソート
                const sortedChats = [...chats].sort((a, b) => b.id - a.id); // 作成日時の新しい順にソート
                
                sortedChats.forEach(chat => { // 各トークを処理
                    const chatElement = createChatElement(chat); // トーク要素を作成
                    if (chat.pinned) { // ピン留めされている場合
                        pinnedChats.appendChild(chatElement); // ピン留めされたトークに追加
                    } else { // ピン留めされていない場合
                        allChats.appendChild(chatElement); // 全てのトークに追加
                    }
                });
            }

            function createChatElement(chat) {
                const div = document.createElement('div'); // トーク要素を作成
                div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`; // クラス名を設定
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="chat-title">${chat.title}</span>
                        <button onclick="showChatMenu(event, '${chat.id}')" class="chat-menu-button">
                            •••
                        </button>
                    </div>
                `;
                div.onclick = () => selectChat(chat.id); // トークを選択
                return div; // トーク要素を返す
            }

            function selectChat(chatId) { // トークを選択
                currentChatId = chatId; // 現在のトークIDを更新
                const chat = chats.find(c => c.id === chatId); // 選択したトークを取得
                currentBot = chat.bot; // 現在のボットIDを更新
                updateChatList(); // チャットリストを更新
                displayMessages(chat.messages); // メッセージを表示
            }

            function displayMessages(messages) { // メッセージを表示
                const messagesDiv = document.getElementById('messages'); // メッセージを表示する要素を取得
                const loadingMessage = document.getElementById('loadingMessage'); // ローディング要素を取得
                const loading = loadingMessage.cloneNode(true); // ローディング要素を複製
                
                messagesDiv.innerHTML = ''; // メッセージをクリア
                
                messages.forEach(message => { // 各メッセージを処理
                    if (!message?.role || !message?.content) { // メッセージが不正な場合
                        console.warn('Invalid message:', message); // エラーをコンソールに出力
                        return; // 処理を終了
                    }

                    const messageDiv = document.createElement('div'); // メッセージ要素を作成
                    messageDiv.className = `flex ${message.role === 'user' ? 'justify-end' : 'justify-start'} py-2`; // クラス名を設定
                    
                    let content = message.content; // メッセージの内容を取得
                    
                    // まず全体をHTMLエスケープ
                    content = content
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;')
                        .replace(/"/g, '&quot;')
                        .replace(/'/g, '&#039;');

                    // コードブロックを装飾（言語識別子を削除）
                    content = content.replace(/```[\w]*\n([\s\S]*?)```/g, (match, code) => {
                        return `<div class="code-block"><div class="code-block-header"><span>コードブロック</span><button class="code-block-copy" onclick="copyCodeBlock(event, this)">コピー</button></div><div class="code-block-content">${code}</div></div>`;
                    });

                    const messageClass = message.role === 'user' 
                        ? 'bg-primary text-white' 
                        : message.role === 'error' 
                            ? 'bg-red-100 text-red-600'
                            : 'bg-gray-100';

                    messageDiv.innerHTML = `<div class="message-container relative group max-w-[70%]"><div class="${messageClass} rounded-lg px-4 py-2 w-full whitespace-pre-wrap break-words">${content}</div></div>`;
                    
                    messagesDiv.appendChild(messageDiv);
                });
                
                // ローディング要素を再追加
                messagesDiv.appendChild(loading); // ローディング要素を追加
                messagesDiv.scrollTop = messagesDiv.scrollHeight; // スクロール位置を更新
            }

            function showChatMenu(event, chatId) {
                event.stopPropagation(); // イベントのバブリングを停止
                const menu = document.getElementById('chatMenu'); // チャットメニューを取得
                menu.classList.remove('hidden'); // チャットメニューを表示
                menu.style.top = `${event.pageY}px`; // チャットメニューの位置を更新
                menu.style.left = `${event.pageX}px`; // チャットメニューの位置を更新
                currentChatId = chatId; // 現在のトークIDを更新
            }

            function editChatTitle() { // トークのタイトルを編集
                const chat = chats.find(c => c.id === currentChatId); // 現在のトークを取得
                const newTitle = prompt('新しいタイトルを入力してください', chat.title); // 新しいタイトルを入力
                if (newTitle) { // 新しいタイトルが入力された場合
                    chat.title = newTitle; // タイトルを更新
                    updateChatList(); // チャットリストを更新
                    saveChats(); // チャット履歴を保存
                    displayMessages(chat.messages);  // 現在のメッセージを再表示
                }
                document.getElementById('chatMenu').classList.add('hidden'); // チャットメニューを非表示
            }

            function togglePinChat() { // トークのピン留め状態を切り替え
                const chat = chats.find(c => c.id === currentChatId); // 現在のトークを取得
                chat.pinned = !chat.pinned; // ピン留め状態を切り替え
                updateChatList(); // チャットリストを更新
                saveChats(); // チャット履歴を保存
                displayMessages(chat.messages);  // 現在のメッセージを再表示
                document.getElementById('chatMenu').classList.add('hidden'); // チャットメニューを非表示
            }

            function deleteChat() { // トークを削除
                if (confirm('このトークを削除してもよろしいですか？')) { // 確認ダイアログを表示
                    chats = chats.filter(c => c.id !== currentChatId); // トークを削除
                    
                    // 他のトークがある場合は最新のトークを選択
                    if (chats.length > 0) { // トークがある場合
                        const latestChat = chats[chats.length - 1]; // 最新のトークを取得
                        currentChatId = latestChat.id; // 現在のトークIDを更新
                        currentBot = latestChat.bot; // 現在のボットIDを更新
                        displayMessages(latestChat.messages); // メッセージを表示
                    } else { // トークがない場合
                        createNewChat(); // 新しいトークを作成
                    }
                    
                    updateChatList(); // チャットリストを更新
                    saveChats(); // チャット履歴を保存
                }
                document.getElementById('chatMenu').classList.add('hidden'); // チャットメニューを非表示
            }

            // ボット選択関連
            function openBotSelector() { // ボット選択モーダルを開く
                document.getElementById('botSelector').classList.remove('hidden'); // ボット選択モーダルを表示
            }

            function closeBotSelector() { // ボット選択モーダルを閉じる
                document.getElementById('botSelector').classList.add('hidden'); // ボット選択モーダルを非表示
            }

            async function sendMessage() { // メッセージを送信
                // 先頭でトークン制限をチェック
                if (!canSendMessage()) { // トークン制限をチェック
                    showTokenLimitModal(getTokenLimitMessage()); // トークン制限モーダルを表示
                    return; // 処理を終了
                }

                // ボット選択チェックは維持
                if (!currentBot) {
                    showBotSelector(); // ボット選択モーダルを表示
                    return; // 処理を終了
                }
                
                const input = document.getElementById('messageInput'); // メッセージ入力欄を取得
                const message = input.value.trim(); // メッセージを取得
                if (!message) return; // メッセージが空の場合は処理を終了

                try {
                    // 入力メッセージのトークン数を計算
                    const response = await fetch('/calculate_tokens', { // トークン数を計算
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ text: message }) // メッセージを送信
                    });
                    
                    const tokenData = await response.json(); // トークン数を取得
                    
                    // トークン計算方法をログ表示
                    console.log(
                        `残りトークン: ${document.getElementById('remainingTokens').textContent}トークン | ` +
                        `トークン計算: ${tokenData.tokens}トークン ` +
                        `(計算方法: ${tokenData.method === 'tiktoken' ? 'tiktoken (Claude)' : 'フォールバック'})` +
                        `${tokenData.success ? '✅' : '⚠️'}`
                    );

                    // トークン制限チェック
                    if (tokenData.remaining_tokens <= 0) {  // 残りトークンが0以下の場合
                        showTokenLimitModal(getTokenLimitMessage()); // トークン制限モーダルを表示
                        return; // 処理を終了
                    } else if (tokenData.tokens > tokenData.remaining_tokens) {  // 必要なトークン数が残りトークン数を超える場合
                        showTokenLimitModal(getTokenLimitMessage()); // トークン制限モーダルを表示
                        return; // 処理を終了
                    }

                    // 入力トークンを消費（ユーザー送信時）
                    tokenManager.useTokens(tokenData.tokens); // トークンを消費

                    const chat = chats.find(c => c.id === currentChatId); // 現在のトークを取得
                    chat.messages.push({ // ユーザー送信メッセージを追加
                        role: 'user',
                        content: message
                    });
                    
                    displayMessages(chat.messages); // メッセージを表示
                    input.value = ''; // メッセージ入力欄をクリア

                    // ローディング表示
                    const loadingMessage = document.getElementById('loadingMessage'); // ローディング要素を取得
                    loadingMessage.classList.remove('hidden'); // ローディング要素を表示

                    const apiResponse = await fetch(`/chat/${currentBot}`, { // チャットAPIにリクエスト
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            message: message,
                            conversation_id: chat.conversation_id  // 各トーク固有の会話IDを使用
                        })
                    });

                    if (!apiResponse.ok) {
                        let errorMessage = 'エラーが発生しました。';
                        if (apiResponse.status === 500) {
                            errorMessage = `
【500エラー】
申し訳ありません。サーバーでエラーが発生しました。

考えられる原因:
1. 応答生成のタイムアウト
2. サーバーの一時的な問題
3. トークン制限の超過

対処方法:
1. しばらく待ってから再度お試しください
2. メッセージを短く分けて送信してみてください
3. ブラウザをリロードしてください

エラーが続く場合は、サポートまでご連絡ください。`;
                        }
                        throw new Error(errorMessage); // エラーをスロー
                    }

                    const data = await apiResponse.json(); // データを取得
                    loadingMessage.classList.add('hidden'); // ローディング要素を非表示

                    // AIの応答を追加
                    chat.messages.push({ // AI送信メッセージを追加
                        role: 'assistant',
                        content: data.answer
                    });

                    // AIの応答を受信後、応答のトークン数も計算
                    const outputTokenResponse = await fetch('/calculate_tokens', { // トークン数を計算
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ text: data.answer }) // AIの応答を送信
                    });
                    
                    const outputTokenData = await outputTokenResponse.json(); // トークン数を取得
                    
                    // 応答のトークン数をログ表示
                    console.log(
                        `残りトークン: ${document.getElementById('remainingTokens').textContent}トークン | ` +
                        `応答トークン: ${outputTokenData.tokens}トークン ` +
                        `(計算方法: ${outputTokenData.method === 'tiktoken' ? 'tiktoken (Claude)' : 'フォールバック'})` +
                        `${outputTokenData.success ? '✅' : '⚠️'}`
                    );

                    // レスポンス後のトークン制限チェック
                    const remainingTokens = parseInt(document.getElementById('remainingTokens').textContent); // 残りトークンを取得
                    if (remainingTokens <= 0) { // 残りトークンが0以下の場合
                        showTokenLimitModal(getTokenLimitMessage()); // トークン制限モーダルを表示
                        return; // 処理を終了
                    }

                    // 出力トークンを計算（サーバーサイド）
                    const outputTokens = await tokenManager.calculateTokens(data.answer); // トークン数を計算
                    tokenManager.useTokens(outputTokens); // トークンを消費
                    
                    displayMessages(chat.messages); // メッセージを表示
                    saveChats(); // チャット履歴を保存
                    
                    // 新しい会話IDを保存
                    if (data.conversation_id) { // 会話IDが存在する場合
                        chat.conversation_id = data.conversation_id; // 会話IDを更新
                        saveChats();  // LocalStorageに保存
                    }
                    
                } catch (error) { // エラーが発生した場合
                    console.error('Error:', error); // エラーをログに出力
                    loadingMessage.classList.add('hidden'); // ローディング要素を非表示
                    
                    // 500エラーの場合、モーダルを表示
                    if (error.message.includes('【500エラー】')) {
                        showErrorModal('申し訳ありません。サーバーでエラーが発生しました。');
                    }
                    
                    chat.messages.push({ // エラーメッセージを追加
                        role: 'error',
                        content: error.message || 'エラーが発生しました。もう一度お試しください。'
                    });
                    displayMessages(chat.messages); // メッセージを表示
                }
            }

            // テキストエリアの高さを自動調整する関数を修正
            function adjustTextareaHeight(textarea) {
                // 一時的に高さをリセット
                textarea.style.height = 'auto';
                
                // スクロール高さと最大高さを比較
                const newHeight = Math.min(textarea.scrollHeight, 200);
                textarea.style.height = newHeight + 'px';
                
                // 最大高さを超えた場合、スクロールを有効化
                textarea.style.overflowY = textarea.scrollHeight > 200 ? 'auto' : 'hidden';
            }

            // テキストエリアのイベントリスナーを設定
            document.getElementById('messageInput').addEventListener('input', function(e) {
                adjustTextareaHeight(this);
            });

            // キーイベントの処理
            document.getElementById('messageInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    if (e.shiftKey) {
                        // Shift + Enter が押された場合は送信
                        e.preventDefault();
                        if (!canSendMessage()) {
                            showTokenLimitModal(getTokenLimitMessage());
                            return;
                        }
                        sendMessage();
                    }
                    // 通常のEnterは改行を許可（デフォルトの動作）
                    adjustTextareaHeight(this);
                }
            });

            // クリック以外でメニューを閉じる
            document.addEventListener('click', (e) => {
                const menu = document.getElementById('chatMenu');
                if (!menu.contains(e.target) && !e.target.classList.contains('chat-menu-button')) {
                    menu.classList.add('hidden');
                }
            });

            // トークンのリセット（デモ用）
            function resetTokens() {
                tokenManager.resetTokens();
            }

            // 初期表示時の処理だけを追加
            document.addEventListener('DOMContentLoaded', () => {
                loadChats();
                
                if (chats.length === 0) {
                    // トークが1つもない場合は、ボット選択モーダルを表示
                    createNewChat();
                } else {
                    // 最新のトークを選択（配列の最後の要素）
                    const latestChat = chats[chats.length - 1];
                    currentChatId = latestChat.id;
                    currentBot = latestChat.bot;
                    
                    // 最新のトークを表示
                    displayMessages(latestChat.messages);
                    
                    // サイドバーのトーク一覧を更新
                    updateChatList();
                }
            });

            // チャットをクリアする時に会話IDもリセット
            function clearChat() {
                chatMessages.innerHTML = '';
                currentConversationId = null;
            }

            // トークン数に基づいて送信ボタンの状態を更新する関数
            function updateSendButtonState() {
                const remainingTokens = parseInt(document.getElementById('remainingTokens').textContent);
                const sendButton = document.getElementById('sendButton');
                
                if (!canSendMessage()) {
                    sendButton.disabled = true;
                    sendButton.title = getTokenLimitMessage().split('\n')[0];  // タイトルには1行目だけ表示
                } else {
                    sendButton.disabled = false;
                    sendButton.removeAttribute('title');
                }
            }

            // ページ読み込み時
            document.addEventListener('DOMContentLoaded', updateSendButtonState);

            // トークン計算の関数内で
            async function calculateTokens(message) { // トークン数を計算
                const response = await fetch('/calculate_tokens', { // トークン数を計算
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: message, user_id: userId }) // メッセージとユーザーIDを送信
                });
                const tokenData = await response.json(); // トークン数を取得
                document.getElementById('remainingTokens').textContent = tokenData.remaining_tokens; // 残りトークンを表示
                updateSendButtonState();  // 送信ボタンの状態を更新
                return tokenData;
            }

            // メッセージ送信後のレスポンス処理時
            async function handleResponse(response) { // レスポンス処理
                const remainingTokens = parseInt(document.getElementById('remainingTokens').textContent) - outputTokenData.tokens; // 残りトークンを更新
                document.getElementById('remainingTokens').textContent = remainingTokens; // 残りトークンを表示
                updateSendButtonState();  // 送信ボタンの状態を更新
            }

            // トークン制限メッセージを生成する関数を追加
            function getTokenLimitMessage() { // トークン制限メッセージを生成
                const totalTokens = 30000;  // 1日の上限トークン数
                const remainingTokens = parseInt(document.getElementById('remainingTokens').textContent); // 残りトークンを取得
                const usedTokens = totalTokens - remainingTokens; // 使用済みトークンを計算
                const tomorrow = new Date(); // 明日の日付を取得
                tomorrow.setDate(tomorrow.getDate() + 1); // 明日の日付を設定
                tomorrow.setHours(0, 0, 0, 0); // 明日の時間を設定
                
                return `【トークン制限のお知らせ】

トークンの本日分使用枠を使い切りました。

■ 次回利用可能時間
${tomorrow.getFullYear()}年${tomorrow.getMonth() + 1}月${tomorrow.getDate()}日 0:00から

■ 現在の使用状況
本日の使用量: ${usedTokens.toLocaleString()} トークン
1日の上限: ${totalTokens.toLocaleString()} トークン

■ ご利用再開までの選択肢
1. 深夜0時の自動リセットをお待ちください
2. トークン使用枠の増枠をご検討ください
   → サポートLINEにてご相談を承ります。
   「講座生成ツールのトークン増枠」とお伝えください。

ご不便をおかけし申し訳ございません。
引き続きのご利用をお待ちしております。`;
            }

            // モーダル表示関数
            function showTokenLimitModal(message) { // トークン制限モーダルを表示
                const modal = document.getElementById('tokenLimitModal'); // モーダル要素を取得
                const content = document.getElementById('tokenLimitModalContent'); // モーダル内容要素を取得
                content.textContent = message; // メッセージを表示
                modal.classList.remove('hidden'); // モーダルを表示
                modal.classList.add('flex'); // モーダルを表示
            }

            // モーダルを閉じる関数
            function closeTokenLimitModal() { // トークン制限モーダルを閉じる
                const modal = document.getElementById('tokenLimitModal'); // モーダル要素を取得
                modal.classList.add('hidden'); // モーダルを非表示
                modal.classList.remove('flex'); // モーダルを非表示
            }

            // エラーモーダルを制御する関数を追加
            function showErrorModal(message) { // エラーモーダルを表示
                const modal = document.getElementById('errorModal'); // モーダル要素を取得
                const messageElement = document.getElementById('errorMessage'); // メッセージ要素を取得
                if (modal && messageElement) { // モーダルとメッセージ要素が存在する場合
                    messageElement.textContent = message; // メッセージを表示
                    modal.classList.remove('hidden'); // モーダルを表示
                } else {
                    console.error('Error modal elements not found'); // モーダル要素が見つからない場合
                }
            }

            // エラーモーダルを閉じる関数を追加
            function closeErrorModal() { // エラーモーダルを閉じる
                const modal = document.getElementById('errorModal'); // モーダル要素を取得
                modal.classList.add('hidden'); // モーダルを非表示
            }

            // エラー発生時の処理
            function handleError(error) {
                console.error('Error:', error);
                showErrorModal('申し訳ありません。サーバーでエラーが発生しました。');
                // 既存のエラー処理も維持
                appendErrorMessage('エラーが発生しました。しばらく待ってから再度お試しください。');
            }

            function appendMessage(role, content) { // メッセージを表示
                const messageDiv = document.createElement('div'); // メッセージ要素を作成
                messageDiv.className = `message ${role}`; // メッセージ要素にクラスを追加
                
                const contentDiv = document.createElement('div'); // メッセージ内容要素を作成
                contentDiv.className = 'message-content'; // メッセージ内容要素にクラスを追加
                contentDiv.innerHTML = content; // メッセージ内容を表示
                
                // コードブロックのスタイリング
                if (content.includes('```')) { // コードブロックが含まれる場合
                    contentDiv.classList.add('code-block'); // コードブロック要素にクラスを追加
                }
                
                messageDiv.appendChild(contentDiv); // メッセージ要素にメッセージ内容要素を追加
                chatMessages.appendChild(messageDiv); // メッセージ要素をチャットメッセージ要素に追加
                chatMessages.scrollTop = chatMessages.scrollHeight; // チャットメッセージ要素を最下部までスクロール
            }

            function copyCodeBlock(event, button) { // コードブロックをコピー
                event.stopPropagation(); // イベントの伝播を停止
                
                const codeBlock = button.closest('.code-block'); // コードブロック要素を取得
                const code = codeBlock.querySelector('.code-block-content').innerText; // コードブロック内容を取得
                
                navigator.clipboard.writeText(code).then(() => { // コードブロック内容をクリップボードにコピー
                    const originalText = button.innerText; // 元のテキストを取得
                    button.innerText = '完了'; // テキストを変更
                    button.disabled = true; // ボタンを無効化
                    
                    setTimeout(() => { // 2秒後に実行
                        button.innerText = originalText; // 元のテキストを表示
                        button.disabled = false; // ボタンを有効化
                    }, 2000); // 2秒後に実行
                }).catch(err => { // コピーに失敗した場合
                    console.error('コピーに失敗しました:', err); // エラーをログに出力
                    button.innerText = 'コピー失敗';
                    
                    setTimeout(() => { // 2秒後に実行
                        button.innerText = 'コピー'; // テキストを変更
                        button.disabled = false; // ボタンを有効化
                    }, 2000);
                });
            }
        </script>
    </body>
